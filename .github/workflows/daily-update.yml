name: Daily Update by 25ds3000149@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '30 15 * * *'  # Runs daily at 3:30 PM UTC (pick any specific time, not "*"; use crontab.guru to check)
  workflow_dispatch:  # ADD THIS LINE - enables manual run button

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update status by 25ds3000149@ds.study.iitm.ac.in
        run: |
          echo "$(date): Daily automated update" >> status.txt

      - name: Commit changes
        run: |
          git config user.name "DevSync Bot"
          git config user.email "25ds3000149@ds.study.iitm.ac.in"
          git add status.txt
          git commit -m "Daily update: $(date)"
          git push
